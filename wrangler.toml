name = "sub"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[
env.production
]
name = "subscription-manager"

[
env.staging
]
name = "subscription-manager-staging"

# ↓↓↓ 我帮你改成 Cloudflare 一键部署能识别的格式 ↓↓↓
kv_namespaces = [
    { binding = "SUBSCRIPTIONS_KV", id = "3f68b48591e14565bf1ad681271576cc" }
]

# 定时任务
[
triggers
]
crons = ["0 8 * * *"]

# 环境变量
[
vars
]
ENVIRONMENT = "production"
